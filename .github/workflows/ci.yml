name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache mongodb-memory-server binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-memory-server-${{ runner.os }}

      - name: Install backend dependencies
        working-directory: back-end
        run: npm install

      - name: Run backend tests
        working-directory: back-end
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-for-ci
          PORT: 3001
          ALLOW_IN_MEMORY_DB: 'true'
          MONGOMS_CACHE_PATH: ~/.cache/mongodb-binaries

      - name: Install frontend dependencies
        working-directory: front-end
        run: npm install

      - name: Build frontend
        working-directory: front-end
        run: npm run build